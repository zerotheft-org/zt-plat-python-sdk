name: CI — Test, Build & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  CODEARTIFACT_DOMAIN: zerotheft
  CODEARTIFACT_REPO: zerotheft-python
  CODEARTIFACT_OWNER: "744561091152"

jobs:
  test-common:
    name: Test common package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/common
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch env create
      - run: hatch run pytest src/common/tests.py -v || true

  test-rls:
    name: Test RLS package (phase 1)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rls
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch env create
      - run: hatch run pytest tests/phase1/ -v

  build-and-publish:
    name: Build & Publish to CodeArtifact
    runs-on: ubuntu-latest
    needs: [test-common, test-rls]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CODEARTIFACT_PUBLISH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to CodeArtifact (pip)
        run: |
          aws codeartifact login --tool pip \
            --repository ${{ env.CODEARTIFACT_REPO }} \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.CODEARTIFACT_OWNER }} \
            --region ${{ env.AWS_REGION }}

      - name: Login to CodeArtifact (twine)
        run: |
          aws codeartifact login --tool twine \
            --repository ${{ env.CODEARTIFACT_REPO }} \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.CODEARTIFACT_OWNER }} \
            --region ${{ env.AWS_REGION }}

      - name: Install build tools
        run: pip install build twine

      - name: Build common package
        working-directory: packages/common
        run: python -m build

      - name: Build RLS package
        working-directory: packages/rls
        run: python -m build

      - name: Publish common package
        working-directory: packages/common
        run: twine upload --repository codeartifact dist/*

      - name: Publish RLS package
        working-directory: packages/rls
        run: twine upload --repository codeartifact dist/*
