name: CI — Test, Build & Publish

on:
  push:
    branches: [main]
    paths:
      - 'packages/common/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/common/**'
      - '.github/workflows/ci.yml'

env:
  AWS_REGION: us-east-1
  CODEARTIFACT_DOMAIN: zt
  CODEARTIFACT_REPO: zt-python
  CODEARTIFACT_OWNER: "744561091152"

jobs:
  test:
    name: Test common package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/common
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch env create
      - run: hatch run pytest tests/ -v

  build-and-publish:
    name: Build & Publish to CodeArtifact
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN || 'arn:aws:iam::744561091152:role/zt-github-actions-ecr-push' }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to CodeArtifact (pip)
        run: |
          aws codeartifact login --tool pip \
            --repository ${{ env.CODEARTIFACT_REPO }} \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.CODEARTIFACT_OWNER }} \
            --region ${{ env.AWS_REGION }}

      - name: Login to CodeArtifact (twine)
        run: |
          aws codeartifact login --tool twine \
            --repository ${{ env.CODEARTIFACT_REPO }} \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.CODEARTIFACT_OWNER }} \
            --region ${{ env.AWS_REGION }}

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: packages/common
        run: python -m build

      - name: Publish package
        working-directory: packages/common
        run: twine upload --repository codeartifact dist/*
