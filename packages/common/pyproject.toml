[project]
name = "common"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
]

[project.optional-dependencies]
aws      = ["boto3>=1.28.0"]
redis    = ["redis>=7.1.0"]
rabbitmq = ["pika>=1.3.2"]
messaging = ["aio-pika>=9.0.0"]
all      = ["boto3>=1.28.0", "redis>=7.1.0", "pika>=1.3.2", "aio-pika>=9.0.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/common"]